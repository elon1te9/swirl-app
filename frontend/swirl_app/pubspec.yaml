name: swirl_app
description: "Android app for Russian-speaking beginners learning English vocabulary."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  dio: ^5.9.2
  flutter_secure_storage: ^10.2.0
  go_router: ^17.2.3
  flutter_riverpod: ^3.3.1
  audioplayers: ^6.6.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - images/mascot_home.png
    - images/sections/
    - images/backgrounds/
